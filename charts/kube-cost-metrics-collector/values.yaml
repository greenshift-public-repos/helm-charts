prometheus:
  kube-state-metrics:
    releaseLabel: true
    collectors:
      - pods
      - nodes
      - resourcequotas
    metricLabelsAllowlist:
      - nodes=[*]
      - pods=[*]
    metricAnnotationsAllowList: []

  serviceAccounts:
    alertmanager:
      create: false

  kubeStateMetrics:
    enabled: true

  prometheus-node-exporter:
    enabled: false
    hostNetwork: false
    # AKS system node pools carry the CriticalAddonsOnly taint.
    # These tolerations allow node-exporter to run on every node,
    # including system pools, so that node capacity metrics are complete.
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule

  prometheus-pushgateway:
    enabled: true
    persistentVolume:
      enabled: false

  alertmanager:
    enabled: false

  server:
    remote_write:
    # Placeholder URL. This should never be used as-is.
    # The backend generates the install command with this value pre-filled.
    - url: https://<your-greenshift-host>/storage/api/v2/write
      name: greenshift
      # cAdvisor exports ~100 container_* metrics per container.
      # GreenShift only reads two of them; drop the rest before they reach Thanos.
      # RE2 has no negative lookahead, so three rules emulate "drop container_* except X and Y".
      write_relabel_configs:
        - source_labels: [__name__]
          regex: 'container_.*'
          action: replace
          target_label: __tmp_gs_drop
          replacement: '1'
        - source_labels: [__name__]
          regex: 'container_cpu_usage_seconds_total|container_memory_usage_bytes'
          action: replace
          target_label: __tmp_gs_drop
          replacement: '0'
        - source_labels: [__tmp_gs_drop]
          regex: '1'
          action: drop


    # GreenShift Kubernetes data source id
    dataSourceId: null
    # Username which is used on GreenShift Kubernetes data source registration
    username: null
    # Password which is used on GreenShift Kubernetes data source registration
    password: null
    # Remote write GreenShift target tls CA certificate file
    caFile:

    configMapOverrideName: prometheus-server-config
    persistentVolume:
      enabled: false
    defaultFlagsOverride:
    - --enable-feature=agent
    - --config.file=/etc/config/prometheus.yml
    - --web.enable-lifecycle
    extraConfigmapMounts:
    # Config map with CA cert file
    - name: cert-config
      mountPath: /etc/greenshift/ssl
      configMap: prometheus-server-cert-config
      subPath: ""
      readOnly: true
    extraSecretMounts:
    # Secret with password file
    - name: password-secret
      mountPath: /etc/greenshift/auth
      subPath: ""
      secretName: prometheus-server-password-secret
      readOnly: true
  serverFiles:
    prometheus.yml:
      rule_files: []
